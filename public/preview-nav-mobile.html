<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Mobile Nav Preview — Split Experience</title>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #1a1a1a; display: flex; align-items: flex-start; justify-content: center; gap: 48px; padding: 40px 20px; flex-wrap: wrap; }

    .col { display: flex; flex-direction: column; align-items: center; gap: 12px; }
    .col-label { font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase; color: rgba(255,255,255,0.35); font-family: 'Inter', sans-serif; }

    /* Phone */
    .phone { width: 390px; background: #fff; border-radius: 48px; box-shadow: 0 0 0 11px #111, 0 0 0 13px #333, 0 40px 80px rgba(0,0,0,0.5); overflow: hidden; }
    .phone-top { background: #fff; height: 48px; display: flex; align-items: flex-end; justify-content: center; padding-bottom: 6px; }
    .di { width: 120px; height: 32px; background: #000; border-radius: 20px; }
    .phone-body { overflow: hidden; }

    /* Nav */
    .site-nav {
      background: rgba(255,255,255,0.97);
      border-bottom: 1px solid rgba(0,0,0,0.07);
      padding: 0 20px;
      display: flex; justify-content: space-between; align-items: center;
      height: 60px;
    }
    .logo { font-family: 'Oswald', sans-serif; font-weight: 700; font-size: 18px; letter-spacing: 0.06em; color: #111; text-transform: uppercase; }
    .logo span { color: #e8356d; }
    .hamburger { display: flex; flex-direction: column; gap: 5px; cursor: pointer; background: none; border: none; padding: 4px; }
    .hamburger span { display: block; width: 22px; height: 2px; background: #111; }

    /* Closed state — hero visible below nav */
    .hero-preview { height: 200px; background: #2a2a2a; position: relative; overflow: hidden; }
    .hero-preview img { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.4); }
    .hero-text { position: absolute; bottom: 20px; left: 20px; }
    .hero-h { font-family: 'Oswald', sans-serif; font-weight: 700; font-size: 38px; text-transform: uppercase; color: #fff; line-height: 0.92; }
    .hero-sub { font-size: 11px; color: rgba(255,255,255,0.45); letter-spacing: 0.1em; margin-top: 8px; }

    /* Open state — dropdown */
    .nav-dropdown {
      background: #fff;
      border-bottom: 1px solid rgba(0,0,0,0.07);
      padding: 8px 0 16px;
    }
    .nav-dropdown a {
      display: block; padding: 13px 24px;
      font-size: 12px; letter-spacing: 0.14em; text-transform: uppercase;
      color: #333; text-decoration: none; font-family: 'Inter', sans-serif;
      border-bottom: 1px solid rgba(0,0,0,0.05);
    }
    .nav-dropdown a:last-of-type { border-bottom: none; margin-bottom: 12px; }
    .btn-wa-nav {
      background: #e8356d; color: #fff;
      margin: 0 20px;
      padding: 13px 0; font-size: 10px;
      letter-spacing: 0.2em; text-transform: uppercase;
      font-family: 'Inter', sans-serif;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .wa-dot { width: 6px; height: 6px; background: #25D366; border-radius: 50%; }

    /* X icon */
    .x-icon { position: relative; width: 22px; height: 22px; }
    .x-icon span { position: absolute; top: 50%; left: 0; width: 22px; height: 2px; background: #111; }
    .x-icon span:first-child { transform: translateY(-50%) rotate(45deg); }
    .x-icon span:last-child { transform: translateY(-50%) rotate(-45deg); }
  </style>
</head>
<body>

<!-- CLOSED STATE -->
<div class="col">
  <div class="col-label">Nav closed (default)</div>
  <div class="phone">
    <div class="phone-top"><div class="di"></div></div>
    <div class="phone-body">
      <nav class="site-nav">
        <span class="logo">Split<span>.</span>Experience</span>
        <div class="hamburger">
          <span></span><span></span><span></span>
        </div>
      </nav>
      <div class="hero-preview">
        <img src="https://images.unsplash.com/photo-1555990793-da11153b6ded?auto=format&fit=crop&w=800&q=60" alt="" />
        <div class="hero-text">
          <div class="hero-h">Split,<br>done<br>right.</div>
          <div class="hero-sub">Eleven experiences · Booked via WhatsApp</div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- OPEN STATE -->
<div class="col">
  <div class="col-label">Nav open (after tap)</div>
  <div class="phone">
    <div class="phone-top"><div class="di"></div></div>
    <div class="phone-body">
      <nav class="site-nav">
        <span class="logo">Split<span>.</span>Experience</span>
        <div class="hamburger">
          <div class="x-icon"><span></span><span></span></div>
        </div>
      </nav>
      <div class="nav-dropdown">
        <a href="#">Explore</a>
        <a href="#">Adventure</a>
        <a href="#">Dining</a>
        <a href="#">Essentials</a>
        <a href="#">Concierge</a>
        <a href="#">About</a>
        <div class="btn-wa-nav"><span class="wa-dot"></span>Book via WhatsApp</div>
      </div>
    </div>
  </div>
</div>

</body>
</html>
